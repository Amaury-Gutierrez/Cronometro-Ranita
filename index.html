<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cronómetro Ranita</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      
      /* Degradado dinámico con colores de ciclo solar */
      background: linear-gradient(135deg, 
        #4fc3f7, /* Día */
        #ffb74d, /* Atardecer */
        #7e57c2, /* Anochecer */
        #1a237e, /* Noche */
        #ffab91, /* Amanecer */
        #4fc3f7, /* Día */
        #ffb74d  /* Atardecer */
      );
      background-size: 600% 600%;
      animation: degradado-dia-noche 40s linear infinite;
    }

    @keyframes degradado-dia-noche {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* --- Elementos del Cielo --- */
    .sol {
      position: fixed;
      top: 8%;
      right: 15%;
      width: 300px;
      z-index: 0;
      pointer-events: none;
      animation: latido-sol 4s infinite alternate ease-in-out;
    }

    @keyframes latido-sol {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    .nube {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      opacity: 0.85;
    }

    .nube-1 {
      top: 12%;
      width: 250px;
      left: -200px;
      animation: mover-nube 45s linear infinite;
    }

    .nube-2 {
      top: 25%;
      width: 270px;
      left: -200px;
      animation: mover-nube 35s linear infinite 15s;
    }

    @keyframes mover-nube {
      0% { left: -200px; }
      100% { left: 100vw; }
    }
    /* --------------------------- */

    .fondo-habitat {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 100vh;

      background-image: url("images/habitat.png");
      background-repeat: no-repeat;
      background-position: bottom center;
      background-size: 100% auto;

      z-index: 0;
      pointer-events: none;
    }

    #pasto-ranitas {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      /* Altura de la base para que brinquen contenidas en el piso del hábitat */
      height: 25vh; 
      z-index: 1;
      /* overflow visible permite que las ranas salten "hacia arriba" sin cortarse */
      overflow: visible; 
      pointer-events: none;
    }
    
    .rana-suelta {
      position: absolute;
      width: 200px; 
      height: 200px;
      object-fit: contain;
      cursor: grab;
      user-select: none;
      touch-action: none;
      pointer-events: auto;
      filter: drop-shadow(0 5px 8px rgba(0, 0, 0, 0.3));
    }
    
    .rana-suelta:active {
      cursor: grabbing;
    }

    .nombre-autor {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);

      background-color: #dcedc1;
      color: #3b5323;
      border: 3px solid #689f38;
      border-radius: 18px;

      padding: 8px 22px;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 0.4px;

      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
      white-space: nowrap;
    }

    .contenedor {
      position: relative;
      z-index: 2;
      background-color: rgba(241, 248, 233, 0.95);
      border: 5px solid #689f38;
      border-radius: 30px;
      padding: 45px 50px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      width: 520px;     
      min-height: 320px; 
      backdrop-filter: blur(2px);
    }

    h1 {
      color: #33691e;
      margin-bottom: 10px;
      font-size: 50px;
    }
    
    .ranita-icono {
      font-size: 100px;
      margin: 10px 0;
      animation: saltito 1s infinite alternate;
    }

    @keyframes saltito {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    #tiempo {
      font-size: 48px;
      font-weight: bold;
      color: #1b5e20;
      margin: 25px 0;
      background-color: #c8e6c9;
      padding: 15px;
      border-radius: 20px;
      border: 3px dashed #689f38;
    }
    
    .botones button {
      font-size: 18px;
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    #play {
      background-color: #4caf50;
      color: white;
    }

    #detener {
      background-color: #e53935;
      color: white;
    }

    #reiniciar {
      background-color: #039be5;
      color: white;
    }

    button:hover {
      transform: scale(1.08);
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <img src="images/sol.png" class="sol" alt="Sol">
  <img src="images/nube.png" class="nube nube-1" alt="Nube 1">
  <img src="images/nube.png" class="nube nube-2" alt="Nube 2">

  <div class="fondo-habitat"></div>

  <div id="pasto-ranitas"></div>

  <div class="contenedor">

    <div class="nombre-autor">🐸 Lizy Morales Sánchez 🐸</div>

    <h1>Cronómetro Ranita</h1>

    <div class="ranita-icono">🐸</div>

    <div id="tiempo">00:00.00</div>

    <div class="botones">
      <button id="play">▶️ Play</button>
      <button id="detener">⏸️ Detener</button>
      <button id="reiniciar">🔄 Reiniciar</button>
    </div>

  </div>

<script>
  let tiempo_acumulado = 0;  
  let tiempo_inicio = null;  
  let intervalo = null;

  const limite = 15 * 60 * 1000;

  const tiempo = document.getElementById("tiempo");
  const boton_play = document.getElementById("play");
  const boton_detener = document.getElementById("detener");
  const boton_reiniciar = document.getElementById("reiniciar");

  const pasto_ranitas = document.getElementById("pasto-ranitas");

  const tiempo_entre_ranitas = 1 * 60 * 1000; // 1 minuto
  
  let ranitas = [];
  let animacion_ranitas = null;
  let ranitas_activas = false;
  
  // Inicia en 0 para que aparezca la primera rana al instante de presionar Play
  let siguiente_ranita_ms = 0;

  function mostrar_tiempo(ms) {
    let minutos = Math.floor(ms / 60000);
    let segundos = Math.floor((ms % 60000) / 1000);
    let milesimas = Math.floor((ms % 1000) / 10);

    let minutos_texto = String(minutos).padStart(2, "0");
    let segundos_texto = String(segundos).padStart(2, "0");
    let milesimas_texto = String(milesimas).padStart(2, "0");

    tiempo.textContent = minutos_texto + ":" + segundos_texto + "." + milesimas_texto;
  }

  function generar_ranitas_por_tiempo(transcurrido) {
    while (
      siguiente_ranita_ms <= limite &&
      transcurrido >= siguiente_ranita_ms
    ) {
      let minuto_actual = Math.floor(siguiente_ranita_ms / 60000);
      crear_ranita(minuto_actual);
      siguiente_ranita_ms += tiempo_entre_ranitas;
    }
  }

  function actualizar_cronometro() {
    let ahora = performance.now();
    let transcurrido = tiempo_acumulado + (ahora - tiempo_inicio);

    if (transcurrido >= limite) {
      transcurrido = limite;

      generar_ranitas_por_tiempo(transcurrido);
      mostrar_tiempo(transcurrido);

      clearInterval(intervalo);
      intervalo = null;
      tiempo_acumulado = limite;

      detener_ranitas();
      return;
    }

    generar_ranitas_por_tiempo(transcurrido);
    mostrar_tiempo(transcurrido);
  }

  function iniciar_cronometro() {
    if (intervalo === null && tiempo_acumulado < limite) {
      tiempo_inicio = performance.now();
      intervalo = setInterval(actualizar_cronometro, 10);
      iniciar_ranitas();
    }
  }

  function detener_cronometro() {
    if (intervalo !== null) {
      tiempo_acumulado += performance.now() - tiempo_inicio;
      clearInterval(intervalo);
      intervalo = null;
      detener_ranitas();
    }
  }

  function reiniciar_cronometro() {
    clearInterval(intervalo);
    intervalo = null;
    tiempo_acumulado = 0;
    tiempo_inicio = null;

    mostrar_tiempo(0);
    reiniciar_ranitas();
  }

  function crear_ranita(minuto) {
    const ranita = document.createElement("img");
    ranita.classList.add("rana-suelta");
    ranita.draggable = false;

    // Alternar entre los dos prototipos según el minuto
    const imagenes = ["images/rana.png", "images/rana_rey.png"];
    ranita.src = imagenes[minuto % 2];

    pasto_ranitas.appendChild(ranita);

    const size = 80;
    const ancho = pasto_ranitas.clientWidth;
    const alto = pasto_ranitas.clientHeight;

    const datos = {
      elemento: ranita,
      x: Math.random() * (ancho - size), // Posición horizontal
      y: Math.random() * (alto - size),  // Base de profundidad en el pasto
      z: 0,                              // Altura del brinco (gravedad)
      dx: (Math.random() < 0.5 ? 1 : -1) * (Math.random() * 1.5 + 1), // Velocidad X
      dz: 0,                             // Velocidad de salto
      esperando: 0,                      // Pausa entre saltos
      arrastrando: false
    };

    actualizar_posicion_ranita(datos);
    activar_arrastre_ranita(datos);

    ranitas.push(datos);
  }

  function activar_arrastre_ranita(datos) {
    const ranita = datos.elemento;

    let offsetX = 0;
    let offsetY = 0;

    ranita.addEventListener("pointerdown", (e) => {
      datos.arrastrando = true;
      datos.z = 0; // Se resetea el salto al atraparla

      const rect = ranita.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;

      ranita.setPointerCapture(e.pointerId);
    });

    ranita.addEventListener("pointermove", (e) => {
      if (!datos.arrastrando) return;

      const rect_pasto = pasto_ranitas.getBoundingClientRect();

      datos.x = e.clientX - rect_pasto.left - offsetX;
      datos.y = e.clientY - rect_pasto.top - offsetY;

      limitar_ranita_al_pasto(datos);
      actualizar_posicion_ranita(datos);
    });

    ranita.addEventListener("pointerup", () => {
      datos.arrastrando = false;
      datos.dz = -(Math.random() * 4 + 6); // Brinca de inmediato al soltarla
      datos.dx = (Math.random() < 0.5 ? 1 : -1) * (Math.random() * 1.5 + 1);
    });

    ranita.addEventListener("pointercancel", () => {
      datos.arrastrando = false;
    });
  }

  function limitar_ranita_al_pasto(datos) {
    const ancho = pasto_ranitas.clientWidth;
    const alto = pasto_ranitas.clientHeight;
    const size = 80;

    datos.x = Math.max(0, Math.min(ancho - size, datos.x));
    datos.y = Math.max(0, Math.min(alto - size, datos.y));
  }

  function actualizar_posicion_ranita(datos) {
    // Top se define combinando la base Y (profundidad en el pasto) y Z (el brinco)
    datos.elemento.style.left = datos.x + "px";
    datos.elemento.style.top = (datos.y + datos.z) + "px";

    // Efecto espejo y aumento al arrastrar
    let direccion = datos.dx < 0 ? -1 : 1; 
    let escala = datos.arrastrando ? 1.2 : 1;
    
    datos.elemento.style.transform = `scaleX(${direccion * escala}) scaleY(${escala})`;
  }

  function mover_ranitas() {
    if (!ranitas_activas) return;

    ranitas.forEach(datos => {
      if (datos.arrastrando) return;

      if (datos.esperando > 0) {
        datos.esperando--; // Se queda quieta
      } else {
        // Aplica físicas
        datos.x += datos.dx;
        datos.z += datos.dz;
        datos.dz += 0.45; // Gravedad del salto

        const ancho = pasto_ranitas.clientWidth;
        const size = 80;

        // Si choca con una pared lateral, voltea
        if (datos.x <= 0 || datos.x >= ancho - size) {
          datos.dx *= -1;
          datos.x = Math.max(0, Math.min(ancho - size, datos.x));
        }

        // Si toca el suelo (Z deja de ser negativo)
        if (datos.z >= 0) {
          datos.z = 0;
          datos.dz = 0;
          
          // A veces descansa, a veces sigue saltando
          if (Math.random() < 0.35) {
            datos.esperando = Math.floor(Math.random() * 40) + 20; 
          } else {
            datos.dz = -(Math.random() * 4 + 6); // Fuerza de salto
            let dir_actual = Math.sign(datos.dx) || 1;
            datos.dx = dir_actual * (Math.random() * 1.5 + 1);
          }
        }
      }

      limitar_ranita_al_pasto(datos);
      actualizar_posicion_ranita(datos);
    });

    animacion_ranitas = requestAnimationFrame(mover_ranitas);
  }

  function iniciar_ranitas() {
    if (ranitas_activas) return;

    ranitas_activas = true;
    mover_ranitas();
  }

  function detener_ranitas() {
    ranitas_activas = false;

    if (animacion_ranitas !== null) {
      cancelAnimationFrame(animacion_ranitas);
      animacion_ranitas = null;
    }
  }

  function reiniciar_ranitas() {
    detener_ranitas();

    ranitas.forEach(datos => {
      datos.elemento.remove();
    });

    ranitas = [];
    siguiente_ranita_ms = 0;
  }

  boton_play.addEventListener("click", iniciar_cronometro);
  boton_detener.addEventListener("click", detener_cronometro);
  boton_reiniciar.addEventListener("click", reiniciar_cronometro);

  mostrar_tiempo(0);
</script>

</body>
</html>
